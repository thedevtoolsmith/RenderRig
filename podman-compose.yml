services:
  kroki:
    image: docker.io/yuzutech/kroki
    restart: unless-stopped
    expose:
      - "8000"
    scale: ${KROKI_REPLICAS:-3}

  renderrig:
    image: docker.io/library/nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - kroki
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx/renderrig.local.conf:/etc/nginx/conf.d/default.conf:ro
